name: AimHarder Booker

# Ejecuta cada hora y permite ejecución manual
on:
  schedule:
    - cron: '0 * * * *'   # cada hora en minuto 0 (ajusta si quieres otro intervalo)
  workflow_dispatch:      # permite ejecución manual desde la UI

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || pip install playwright python-dotenv requests
          # instala navegadores de Playwright
          python -m playwright install --with-deps

      - name: Run booking runner
        env:
          AIMHARDER_EMAIL: ${{ secrets.AIMHARDER_EMAIL }}
          AIMHARDER_PASS:  ${{ secrets.AIMHARDER_PASS }}
        run: |
          # asegúrate de que runner.py está en la raíz y es ejecutable con python
          python runner.py

      - name: Upload artifacts (screenshots/logs)
        uses: actions/upload-artifact@v4
        with:
          name: aim-artifacts
          path: artifacts || true
